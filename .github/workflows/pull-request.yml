name: Pull Request

on:
  pull_request:
    branches:
      - master
      - publishing
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: "true"
  DOTNET_NOLOGO: "true"

jobs:
  verify:
    name: Build and Check
    if: ${{ github.event_name != 'pull_request' || !github.event.pull_request.draft }}
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Check out publisher
        uses: actions/checkout@v7.0.0
        with:
          persist-credentials: false

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v5.4.0
        with:
          cache: true
          cache-dependency-path: "**/packages.lock.json"
          global-json-file: global.json

      - name: Cache aqua tools
        uses: actions/cache@v6.1.0
        with:
          path: ~/.local/share/aquaproj-aqua
          key: aqua-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('aqua.yml', 'aqua-checksums.json') }}
          restore-keys: |
            aqua-${{ runner.os }}-${{ runner.arch }}-

      - name: Set up aqua tools
        uses: aquaproj/aqua-installer@v4.0.5
        with:
          aqua_version: v2.60.1

      - name: Restore
        run: dotnet restore Taiwu.WorkshopPublisher.slnx --locked-mode

      - name: Build
        run: dotnet build Taiwu.WorkshopPublisher.slnx --no-restore

      - name: Check
        run: dotnet msbuild repo.proj -t:Check
